<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#2c2418;--gold:#9e7d52;--gold-light:#c8a96e;--gold-pale:#f5eedf;
  --bg:#fdfaf5;--bg2:#f7f2ea;--surface:#fff;--muted:#8a7d6a;--border:rgba(158,125,82,0.18);
  --green:#2d7a4f;--green-bg:#eafaf1;--red:#c0392b;--red-bg:#fdf0ef;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--brand);min-height:100vh}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:72px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo-img{height:44px;width:auto;mix-blend-mode:multiply;cursor:pointer}
.nav-right{display:flex;gap:12px;align-items:center}
.nav-link{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:color .2s}
.nav-link:hover{color:var(--gold)}
.nav-btn{padding:8px 20px;background:var(--brand);color:var(--gold-pale);border:none;border-radius:100px;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.nav-btn:hover{background:var(--gold);color:white}

/* AUTH TABS */
.auth-wrap{max-width:480px;margin:60px auto;padding:0 24px}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:32px}
.auth-tab{flex:1;padding:14px;text-align:center;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
.auth-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.auth-panel{display:none}
.auth-panel.active{display:block}
.auth-logo{display:flex;justify-content:center;margin-bottom:24px}
.auth-logo img{height:80px;mix-blend-mode:multiply}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;text-align:center;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.6}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.form-group label span{color:var(--red)}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:var(--bg);outline:none;transition:border-color .2s;color:var(--brand)}
.form-group input:focus,.form-group select:focus{border-color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-hint{font-size:11px;color:var(--muted);margin-top:5px}
.submit-btn{width:100%;padding:14px;background:var(--brand);color:var(--gold-pale);border:none;border-radius:100px;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.submit-btn:hover{background:var(--gold);color:white}
.submit-btn:disabled{background:#aaa;cursor:not-allowed}
.form-err{color:var(--red);font-size:13px;margin-top:10px;display:none;text-align:center}
.form-err.show{display:block}
.form-ok{color:var(--green);font-size:13px;margin-top:10px;display:none;text-align:center;background:var(--green-bg);padding:10px;border-radius:8px}
.form-ok.show{display:block}

/* MEMBER CENTER */
.member-wrap{display:none;max-width:800px;margin:40px auto;padding:0 24px 60px}
.member-wrap.show{display:block}
.member-header{display:flex;align-items:center;gap:20px;background:var(--brand);border-radius:20px;padding:28px 32px;margin-bottom:28px;color:white}
.member-avatar{width:64px;height:64px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;color:white;flex-shrink:0}
.member-info{flex:1}
.member-nickname{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;margin-bottom:4px}
.member-email{font-size:13px;opacity:0.6;letter-spacing:0.5px}
.member-level-badge{padding:6px 16px;border:1px solid rgba(200,169,110,0.4);border-radius:100px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-light)}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;text-align:center}
.stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300}
.stat-unit{font-size:12px;color:var(--muted);margin-top:3px}

.section-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.section-head{padding:18px 24px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;justify-content:space-between;align-items:center}
.section-head h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300}
.edit-toggle{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.section-body{padding:20px 24px}

.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.profile-item label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.profile-item .val{font-size:14px;padding:8px 0;border-bottom:1px solid var(--border)}
.profile-item input,.profile-item select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);outline:none;transition:border-color .2s}
.profile-item input:focus{border-color:var(--gold)}

.save-profile-btn{margin-top:16px;padding:10px 28px;background:var(--brand);color:var(--gold-pale);border:none;border-radius:100px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.save-profile-btn:hover{background:var(--gold);color:white}

/* ORDERS */
.order-item{padding:16px 0;border-bottom:1px solid var(--border)}
.order-item:last-child{border-bottom:none}
.order-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.order-name{font-size:14px;font-weight:500}
.order-price{font-family:'Cormorant Garamond',serif;font-size:18px}
.order-detail{font-size:12px;color:var(--muted);line-height:1.6}
.order-status{display:inline-block;padding:2px 10px;border-radius:100px;font-size:10px;letter-spacing:1px;text-transform:uppercase}
.status-pending{background:var(--gold-pale);color:var(--gold)}
.status-processing{background:#e8f4fd;color:#2471a3}
.status-completed{background:var(--green-bg);color:var(--green)}
.empty-orders{text-align:center;padding:40px;color:var(--muted);font-size:13px;letter-spacing:1px}

/* LEVEL */
.level-bar-wrap{margin-top:16px}
.level-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:0.5px}
.level-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.level-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:width .8s ease}
.level-hint{font-size:12px;color:var(--muted);margin-top:8px;text-align:center}

.logout-link{display:block;text-align:center;margin-top:24px;font-size:12px;color:var(--muted);letter-spacing:1px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.logout-link:hover{color:var(--red)}

.spinner{width:14px;height:14px;border:2px solid rgba(200,169,110,0.3);border-top-color:var(--gold-light);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brand);color:var(--gold-light);padding:12px 24px;border-radius:100px;font-size:13px;z-index:500;transition:transform .3s;pointer-events:none;white-space:nowrap;border:1px solid rgba(200,169,110,0.2)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  nav{padding:0 20px}
  .form-row,.profile-grid,.stats-grid{grid-template-columns:1fr}
  .auth-wrap,.member-wrap{padding:0 16px}
  .member-header{flex-direction:column;text-align:center}
}
</style>
</head>

<script>
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let currentUser = null
let memberData = null
let isEditing = false

// ── LEVEL CONFIG ──────────────────────────────────
const LEVELS = [
  { key:'bronze', label:'銅級', emoji:'🥉', min:0, max:3000 },
  { key:'silver', label:'銀級', emoji:'🥈', min:3000, max:10000 },
  { key:'gold',   label:'金級', emoji:'🥇', min:10000, max:Infinity },
]

function getLevel(spent) {
  return LEVELS.slice().reverse().find(l => spent >= l.min) || LEVELS[0]
}

// ── AUTH TABS ─────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')))
  document.getElementById('panelLogin').classList.toggle('active', tab==='login')
  document.getElementById('panelRegister').classList.toggle('active', tab==='register')
}

// ── LOGIN ─────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim()
  const pwd = document.getElementById('loginPwd').value
  const errEl = document.getElementById('loginErr')
  const btn = document.getElementById('loginBtn')
  errEl.classList.remove('show')
  if (!email||!pwd) { errEl.textContent='請填寫 Email 和密碼'; errEl.classList.add('show'); return }
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> 登入中...'
  const { error } = await db.auth.signInWithPassword({ email, password: pwd })
  if (error) {
    errEl.textContent='帳號或密碼錯誤，請再試一次'; errEl.classList.add('show')
    btn.disabled=false; btn.textContent='登入'
  }
}

// ── REGISTER ──────────────────────────────────────
async function doRegister() {
  const email = document.getElementById('regEmail').value.trim()
  const pwd = document.getElementById('regPwd').value
  const nickname = document.getElementById('regNickname').value.trim()
  const phone = document.getElementById('regPhone').value.trim()
  const birthday = document.getElementById('regBirthday').value
  const ig = document.getElementById('regIg').value.trim()
  const fb = document.getElementById('regFb').value.trim()
  const addr = document.getElementById('regAddr').value.trim()
  const errEl = document.getElementById('regErr')
  const okEl = document.getElementById('regOk')
  const btn = document.getElementById('regBtn')
  errEl.classList.remove('show'); okEl.classList.remove('show')

  if (!email||!pwd||!nickname) { errEl.textContent='請填寫 Email、密碼和暱稱'; errEl.classList.add('show'); return }
  if (pwd.length < 6) { errEl.textContent='密碼至少需要 6 個字元'; errEl.classList.add('show'); return }

  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> 註冊中...'

  const { data, error } = await db.auth.signUp({ email, password: pwd })
  if (error) {
    errEl.textContent='註冊失敗：'+error.message; errEl.classList.add('show')
    btn.disabled=false; btn.textContent='立即註冊'; return
  }

  if (data.user) {
    const { error: profileErr } = await db.from('members').insert({
      id: data.user.id, email, nickname,
      phone: phone||null, birthday: birthday||null,
      ig_account: ig||null, fb_account: fb||null,
      default_address: addr||null,
      total_spent: 0, order_count: 0, member_level: 'bronze'
    })
    if (profileErr) console.error('建立會員資料失敗', profileErr)
  }

  btn.disabled=false; btn.textContent='立即註冊'
  okEl.textContent='✓ 註冊成功！請查收驗證信後登入'; okEl.classList.add('show')
}

// ── RESET PWD ─────────────────────────────────────
async function doResetPwd() {
  const email = document.getElementById('loginEmail').value.trim()
  if (!email) { document.getElementById('loginErr').textContent='請先填寫 Email'; document.getElementById('loginErr').classList.add('show'); return }
  const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo: location.href })
  if (error) showToast('發送失敗：'+error.message)
  else showToast('重設信已寄出，請查收 Email')
}

// ── LOGOUT ────────────────────────────────────────
async function doLogout() {
  await db.auth.signOut()
}

// ── AUTH STATE ────────────────────────────────────
// 預設顯示登入畫面，等 session 確認後再切換
document.getElementById('authWrap').style.display = 'block'
document.getElementById('memberWrap').classList.remove('show')

db.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    currentUser = session.user
    document.getElementById('authWrap').style.display = 'none'
    document.getElementById('memberWrap').classList.add('show')
    await loadMember()
    await loadOrders()
    await db.from('members').update({ last_login_at: new Date().toISOString() }).eq('id', currentUser.id)
  } else {
    currentUser = null
    document.getElementById('authWrap').style.display = 'block'
    document.getElementById('memberWrap').classList.remove('show')
  }
})

// ── LOAD MEMBER ───────────────────────────────────
async function loadMember() {
  const { data, error } = await db.from('members').select('*').eq('id', currentUser.id).single()
  if (error || !data) { showToast('載入會員資料失敗'); return }
  memberData = data
  renderMember()
}

function renderMember() {
  const m = memberData
  const level = getLevel(m.total_spent)
  const nextLevel = LEVELS.find(l => l.min > m.total_spent)

  // Header
  document.getElementById('memberAvatar').textContent = (m.nickname||'K')[0].toUpperCase()
  document.getElementById('memberNickname').textContent = m.nickname
  document.getElementById('memberEmailDisp').textContent = m.email
  document.getElementById('memberLevelBadge').textContent = level.emoji + ' ' + level.label + '會員'

  // Stats
  document.getElementById('statSpent').textContent = (m.total_spent||0).toLocaleString()
  document.getElementById('statOrders').textContent = m.order_count||0
  document.getElementById('statLevel').textContent = level.label

  // Level bar
  const pct = nextLevel ? Math.min(((m.total_spent - level.min) / (nextLevel.min - level.min)) * 100, 100) : 100
  document.getElementById('levelFill').style.width = pct + '%'
  const remaining = nextLevel ? (nextLevel.min - m.total_spent) : 0
  document.getElementById('statNextAmt').textContent = nextLevel ? 'NT$'+(nextLevel.min-m.total_spent).toLocaleString() : '已達最高'
  document.getElementById('levelHint').textContent = nextLevel
    ? `再消費 NT$${remaining.toLocaleString()} 升級為${nextLevel.label}會員`
    : '🎉 恭喜！你已達到最高金級會員'

  renderProfile(false)
}

// ── PROFILE ───────────────────────────────────────
const PROFILE_FIELDS = [
  { key:'nickname', label:'暱稱', type:'text', required:true },
  { key:'phone', label:'手機號碼', type:'tel' },
  { key:'birthday', label:'生日', type:'date' },
  { key:'ig_account', label:'Instagram', type:'text' },
  { key:'fb_account', label:'Facebook', type:'text' },
  { key:'default_address', label:'預設配送地址', type:'text', full:true },
]

function renderProfile(editing) {
  isEditing = editing
  document.getElementById('editToggle').textContent = editing ? '取消' : '編輯'
  document.getElementById('saveProfileBtn').style.display = editing ? 'block' : 'none'
  const grid = document.getElementById('profileGrid')
  grid.innerHTML = PROFILE_FIELDS.map(f => `
    <div class="profile-item" style="${f.full?'grid-column:1/-1':''}">
      <label>${f.label}</label>
      ${editing
        ? `<input type="${f.type}" id="pf_${f.key}" value="${memberData[f.key]||''}" placeholder="${f.label}">`
        : `<div class="val">${memberData[f.key]||'—'}</div>`}
    </div>`).join('')
}

function toggleEdit() {
  renderProfile(!isEditing)
}

async function saveProfile() {
  const updates = {}
  PROFILE_FIELDS.forEach(f => {
    const el = document.getElementById('pf_' + f.key)
    if (el) updates[f.key] = el.value.trim() || null
  })
  if (!updates.nickname) { showToast('暱稱不能為空'); return }

  const { error } = await db.from('members').update(updates).eq('id', currentUser.id)
  if (error) { showToast('儲存失敗：'+error.message); return }
  Object.assign(memberData, updates)
  renderProfile(false)
  renderMember()
  showToast('資料已更新')
}

// ── ORDERS ────────────────────────────────────────
async function loadOrders() {
  const { data, error } = await db
    .from('orders')
    .select('*')
    .eq('customer_id', currentUser.id)
    .order('created_at', { ascending: false })

  const el = document.getElementById('orderList')
  if (error || !data || data.length === 0) {
    el.innerHTML = '<div class="empty-orders">目前還沒有訂單，快去選購吧！</div>'; return
  }

  const statusMap = { pending:'待確認', processing:'處理中', completed:'已完成', cancelled:'已取消' }
  const statusClass = { pending:'status-pending', processing:'status-processing', completed:'status-completed', cancelled:'status-pending' }

  el.innerHTML = data.map(o => `
    <div class="order-item">
      <div class="order-meta">
        <div class="order-name">${o.text}</div>
        <div class="order-price">NT$ ${(o.price||0).toLocaleString()}</div>
      </div>
      <div class="order-detail">
        ${new Date(o.created_at).toLocaleDateString('zh-TW')}
        ${o.note ? '· '+o.note.split('｜')[0] : ''}
        <span class="order-status ${statusClass[o.status]||'status-pending'}" style="margin-left:8px">${statusMap[o.status]||o.status}</span>
      </div>
    </div>`).join('')
}

// ── TOAST ─────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500)
}
</script>
