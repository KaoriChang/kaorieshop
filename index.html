<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand: #2c2418;
  --gold: #9e7d52;
  --gold-light: #c8a96e;
  --gold-pale: #f5eedf;
  --bg: #fdfaf5;
  --bg2: #f7f2ea;
  --surface: #ffffff;
  --muted: #8a7d6a;
  --border: rgba(158,125,82,0.18);
  --radius: 16px;
  --green: #2d7a4f;
  --green-bg: #eafaf1;
  --red: #c0392b;
}

body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--brand); min-height: 100vh; }

/* ── NAV ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 72px; background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.logo-img { height: 48px; width: auto; }
.nav-center { display: flex; gap: 36px; font-size: 12px; color: var(--muted); letter-spacing: 1.5px; }
.nav-center a { cursor: pointer; transition: color .2s; text-decoration: none; color: inherit; text-transform: uppercase; }
.nav-center a:hover { color: var(--gold); }
.cart-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 20px; background: var(--brand); color: var(--gold-pale);
  border-radius: 100px; font-size: 12px; cursor: pointer;
  border: none; transition: all .2s; letter-spacing: 1px; text-transform: uppercase;
}
.cart-btn:hover { background: var(--gold); color: white; }
.cart-count {
  background: var(--gold-light); color: white; min-width: 18px; height: 18px;
  border-radius: 9px; font-size: 10px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; padding: 0 4px;
}

/* ── HERO ── */
.hero {
  min-height: 86vh; display: grid; grid-template-columns: 1fr 1fr;
  align-items: center; max-width: 1100px; margin: 0 auto;
  padding: 80px 48px; gap: 80px;
}
.hero-left {}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 28px;
}
.hero-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--gold); }
.hero h1 {
  font-family: 'Cormorant Garamond', serif; font-size: 54px; line-height: 1.12;
  font-weight: 300; color: var(--brand); margin-bottom: 22px; letter-spacing: -0.5px;
}
.hero h1 em { color: var(--gold); font-style: italic; }
.hero p { color: var(--muted); font-size: 15px; line-height: 1.85; margin-bottom: 40px; max-width: 400px; }
.hero-cta {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 14px 36px; background: var(--brand); color: var(--gold-pale);
  border-radius: 100px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: all .3s; border: none;
}
.hero-cta:hover { background: var(--gold); color: white; }
.hero-cta::after { content: '→'; font-size: 14px; }
.hero-right {
  display: flex; align-items: center; justify-content: center;
}
.hero-logo-wrap {
  width: 380px; height: 380px;
  background: var(--bg2);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
  position: relative;
}
.hero-logo-wrap::before {
  content: ''; position: absolute; inset: 12px;
  border-radius: 50%; border: 1px solid var(--border);
}
.hero-logo { width: 240px; height: 240px; object-fit: contain; }

/* ── SECTION ── */
.section-wrap { background: var(--bg2); padding: 64px 0; }
.section { max-width: 1100px; margin: 0 auto; padding: 0 48px; }
.section-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.section-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; }
.section-sub { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter {
  padding: 6px 16px; border-radius: 100px; font-size: 11px; cursor: pointer;
  border: 1px solid var(--border); color: var(--muted); background: transparent;
  transition: all .2s; letter-spacing: 1px; text-transform: uppercase;
}
.filter.active { background: var(--brand); color: var(--gold-pale); border-color: var(--brand); }
.filter:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

.products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

.product-card {
  background: var(--surface); border-radius: var(--radius); overflow: hidden;
  border: 1px solid var(--border); cursor: pointer;
  transition: transform .25s, box-shadow .25s;
}
.product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(158,125,82,0.1); }
.product-card.coming-soon { opacity: 0.65; cursor: default; }
.product-card.coming-soon:hover { transform: none; box-shadow: none; }
.product-img {
  height: 220px; display: flex; align-items: center; justify-content: center;
  font-size: 64px; position: relative;
  background: linear-gradient(145deg, var(--bg), var(--bg2));
}
.product-badge {
  position: absolute; top: 12px; left: 12px;
  background: var(--brand); color: var(--gold-light); font-size: 9px;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 4px 12px; border-radius: 100px;
}
.product-body { padding: 20px 22px; }
.product-sub { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.product-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; margin-bottom: 8px; }
.product-desc { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 18px; }
.product-foot { display: flex; align-items: center; justify-content: space-between; }
.product-price { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; }
.product-price::before { content: 'NT$ '; font-size: 12px; color: var(--muted); font-family: 'DM Sans', sans-serif; }
.add-btn {
  padding: 8px 18px; background: var(--brand); color: var(--gold-pale); border: none;
  border-radius: 100px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; transition: all .2s;
}
.add-btn:hover { background: var(--gold); color: white; }
.add-btn.done { background: var(--green); color: white; }
.coming-tag { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

/* ── DRAWER ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(44,36,24,0.45); z-index: 200; }
.overlay.open { display: block; }
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0; width: 400px;
  background: var(--surface); display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); z-index: 201;
  border-left: 1px solid var(--border);
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 28px; border-bottom: 1px solid var(--border); background: var(--bg2);
}
.drawer-head h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 1px; }
.close-x {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border); cursor: pointer; font-size: 14px; color: var(--muted);
  display: flex; align-items: center; justify-content: center; transition: all .2s; background: transparent;
}
.close-x:hover { border-color: var(--gold); color: var(--gold); }
.drawer-body { flex: 1; overflow-y: auto; padding: 20px 28px; }
.empty-cart { text-align: center; color: var(--muted); padding: 60px 0; }
.empty-cart div { font-size: 40px; margin-bottom: 12px; }
.empty-cart p { font-size: 13px; letter-spacing: 0.5px; }
.cart-item { display: flex; align-items: center; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--border); }
.cart-item-thumb { width: 56px; height: 56px; border-radius: 12px; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; margin-bottom: 3px; }
.cart-item-meta { font-size: 12px; color: var(--muted); }
.cart-item-price { font-family: 'Cormorant Garamond', serif; font-size: 18px; }
.remove-item { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; transition: color .2s; }
.remove-item:hover { color: var(--red); }
.drawer-foot { padding: 20px 28px; border-top: 1px solid var(--border); background: var(--bg2); }
.cart-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
.cart-total-row span:first-child { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.cart-total-row span:last-child { font-family: 'Cormorant Garamond', serif; font-size: 26px; }
.checkout-btn { width: 100%; padding: 14px; background: var(--brand); color: var(--gold-pale); border: none; border-radius: 100px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all .2s; }
.checkout-btn:hover { background: var(--gold); color: white; }

/* ── MODAL ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(44,36,24,0.55); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border-radius: 24px; width: 100%; max-width: 540px; max-height: 92vh; overflow-y: auto; }
.modal-header { background: var(--bg2); padding: 28px 36px; border-radius: 24px 24px 0 0; border-bottom: 1px solid var(--border); }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; margin-bottom: 4px; }
.modal-sub { color: var(--muted); font-size: 13px; }
.modal-body { padding: 28px 36px 36px; }
.order-summary-box { background: var(--bg); border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; border: 1px solid var(--border); }
.osb-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
.osb-item { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; color: var(--muted); }
.osb-item span:last-child { color: var(--brand); }
.osb-total { display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; }
.osb-total span:first-child { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.osb-total span:last-child { font-family: 'Cormorant Garamond', serif; font-size: 24px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 10px; font-weight: 500; margin-bottom: 6px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.form-group label span { color: var(--red); }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--bg); outline: none; transition: border-color .2s; color: var(--brand); }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); }
.form-group textarea { resize: none; }
.submit-btn { width: 100%; padding: 15px; background: var(--brand); color: var(--gold-pale); border: none; border-radius: 100px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all .2s; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.submit-btn:hover { background: var(--gold); color: white; }
.submit-btn:disabled { background: #aaa; cursor: not-allowed; }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(200,169,110,0.3); border-top-color: var(--gold-light); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }
.error-msg.show { display: block; }

/* ── SUCCESS ── */
.success-view { text-align: center; padding: 40px 20px; }
.success-icon { font-size: 56px; margin-bottom: 16px; }
.success-view h3 { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; margin-bottom: 10px; }
.success-view p { color: var(--muted); font-size: 14px; line-height: 1.7; margin-bottom: 6px; }
.sync-pill { display: inline-flex; align-items: center; gap: 8px; background: var(--green-bg); color: var(--green); padding: 8px 18px; border-radius: 100px; font-size: 13px; margin: 16px 0 24px; }
.sync-pill::before { content: '✓'; font-weight: 700; }

/* ── FOOTER ── */
footer { background: var(--brand); color: rgba(255,255,255,0.35); text-align: center; padding: 40px 48px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
footer .footer-logo { height: 48px; width: auto; margin-bottom: 16px; opacity: 0.7; }
footer span { color: var(--gold); }

/* ── TOAST ── */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--brand); color: var(--gold-light); padding: 12px 24px; border-radius: 100px; font-size: 13px; z-index: 500; transition: transform .3s ease; pointer-events: none; white-space: nowrap; border: 1px solid rgba(200,169,110,0.2); }
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .nav-center { display: none; }
  .hero { grid-template-columns: 1fr; padding: 48px 24px; gap: 40px; min-height: auto; }
  .hero h1 { font-size: 38px; }
  .hero-logo-wrap { width: 260px; height: 260px; }
  .hero-logo { width: 160px; height: 160px; }
  .hero-right { order: -1; }
  .section { padding: 0 20px; }
  .section-wrap { padding: 48px 0; }
  .products-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .drawer { width: 100%; }
  .form-row { grid-template-columns: 1fr; }
  .modal-header { padding: 24px; }
  .modal-body { padding: 20px 24px 28px; }
}
</style>
</head>

  <div>© 2025 <span>Kaori 香氣飾</span> · 每一朵花，都藏著會變化的香氣</div>
</footer>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const PRODUCTS = [
  { id:'e1', name:'經典蝴蝶結', desc:'透明的金色蝴蝶結耳環，絕對百搭', price:390, emoji:'🎀', cat:'earring', tag:'新品', priority:1 },
  { id:'e2', name:'經典垂墜蝴蝶結', desc:'透明的金色蝴蝶結耳環，運動休閒或甜美風格都適合', price:390, emoji:'✨', cat:'earring', tag:'', priority:2 },
  { id:'c1', name:'文創商品', desc:'獨特文創設計，敬請期待', price:0, emoji:'🌸', cat:'creative', tag:'即將上架', priority:99, comingSoon:true },
]

let cart = JSON.parse(localStorage.getItem('kaori_cart') || '[]')
let currentFilter = 'all'
function saveCart() { localStorage.setItem('kaori_cart', JSON.stringify(cart)) }

function renderProducts(filter = 'all') {
  const items = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.cat === filter)
  const catLabel = {earring:'耳環',clip:'耳夾',bracelet:'手鍊',necklace:'項鍊',ring:'戒指',hair:'髮飾',creative:'文創'}
  if (items.length === 0) {
    document.getElementById('grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase">此分類商品即將上架</div>`
    return
  }
  document.getElementById('grid').innerHTML = items.map(p => `
    <div class="product-card${p.comingSoon ? ' coming-soon' : ''}">
      <div class="product-img">${p.emoji}${p.tag ? `<div class="product-badge">${p.tag}</div>` : ''}</div>
      <div class="product-body">
        <div class="product-sub">${catLabel[p.cat]||''}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-foot">
          ${p.comingSoon
            ? `<span class="coming-tag">即將上架</span>`
            : `<div class="product-price">${p.price.toLocaleString()}</div>
               <button class="add-btn" id="btn_${p.id}" onclick="addToCart('${p.id}')">加入</button>`}
        </div>
      </div>
    </div>`).join('')
}

function filterBy(el, cat) {
  document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'))
  el.classList.add('active'); currentFilter = cat; renderProducts(cat)
}

function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id)
  const ex = cart.find(x => x.id === id)
  if (ex) ex.qty++; else cart.push({ ...p, qty: 1 })
  updateCount(); saveCart(); showToast(`已加入「${p.name}」`)
  const btn = document.getElementById('btn_' + id)
  if (btn) { btn.textContent = '✓'; btn.classList.add('done'); setTimeout(() => { btn.textContent = '加入'; btn.classList.remove('done') }, 1500) }
}

function removeFromCart(id) { cart = cart.filter(x => x.id !== id); updateCount(); saveCart(); renderCart() }
function updateCount() { document.getElementById('cartCount').textContent = cart.reduce((a,b) => a+b.qty, 0) }
function cartTotal() { return cart.reduce((a,b) => a+b.price*b.qty, 0) }

function openCart() { document.getElementById('overlay').classList.add('open'); document.getElementById('drawer').classList.add('open'); renderCart() }
function closeCart() { document.getElementById('overlay').classList.remove('open'); document.getElementById('drawer').classList.remove('open') }

function renderCart() {
  const body = document.getElementById('drawerBody'), foot = document.getElementById('drawerFoot')
  if (cart.length === 0) { body.innerHTML = `<div class="empty-cart"><div>🛍</div><p>購物袋是空的</p></div>`; foot.style.display='none'; return }
  body.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-thumb">${item.emoji}</div>
      <div class="cart-item-info"><div class="cart-item-name">${item.name} × ${item.qty}</div><div class="cart-item-meta">NT$ ${item.price.toLocaleString()} / 件</div></div>
      <div class="cart-item-price">NT$ ${(item.price*item.qty).toLocaleString()}</div>
      <button class="remove-item" onclick="removeFromCart('${item.id}')">✕</button>
    </div>`).join('')
  document.getElementById('cartTotalText').textContent = 'NT$ ' + cartTotal().toLocaleString()
  foot.style.display = 'block'
}

function openForm() { closeCart(); renderOrderSummary(); document.getElementById('modalBg').classList.add('open') }
function closeForm() { document.getElementById('modalBg').classList.remove('open') }
document.getElementById('modalBg').addEventListener('click', e => { if (e.target === document.getElementById('modalBg')) closeForm() })

function renderOrderSummary() {
  document.getElementById('orderSummary').innerHTML = `
    <div class="osb-label">訂單明細</div>
    ${cart.map(i => `<div class="osb-item"><span>${i.name} × ${i.qty}</span><span>NT$ ${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}
    <div class="osb-total"><span>合計</span><span>NT$ ${cartTotal().toLocaleString()}</span></div>`
}

async function submitOrder() {
  const name=document.getElementById('f_name').value.trim(), phone=document.getElementById('f_phone').value.trim()
  const email=document.getElementById('f_email').value.trim(), addr=document.getElementById('f_addr').value.trim()
  const pay=document.getElementById('f_pay').value, time=document.getElementById('f_time').value
  const note=document.getElementById('f_note').value.trim()
  const errEl=document.getElementById('errorMsg'); errEl.classList.remove('show')
  if (!name||!phone||!email||!addr) { errEl.textContent='請填寫所有必填欄位'; errEl.classList.add('show'); return }
  const btn=document.getElementById('submitBtn'); btn.disabled=true; btn.innerHTML='<div class="spinner"></div> 送出中...'
  try {
    const {data:custData,error:custErr} = await db.from('customers').upsert({name},{onConflict:'name',ignoreDuplicates:false}).select('id').single()
    if (custErr) throw custErr
    const {error:orderErr} = await db.from('orders').insert(cart.map(item => ({
      customer_id:custData.id, text:item.name,
      note:[addr&&`地址：${addr}`,pay&&`付款：${pay}`,time!=='不指定'&&`時段：${time}`,note&&`備註：${note}`,`聯絡：${phone} / ${email}`].filter(Boolean).join(' ｜ '),
      status:'pending', price:item.price, priority:item.priority||0
    })))
    if (orderErr) throw orderErr
    cart=[]; saveCart(); updateCount()
    document.getElementById('modalInner').innerHTML = `
      <div class="success-view">
        <div class="success-icon">🌸</div>
        <h3>訂單已成立</h3>
        <p>感謝你選擇 Kaori 香氣飾</p>
        <p style="font-size:13px;margin-top:4px">我們將在 1 個工作天內確認並安排出貨</p>
        <div class="sync-pill">訂單已同步至系統</div><br>
        <button style="padding:12px 32px;border-radius:100px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)" onclick="closeForm();renderProducts(currentFilter)">繼續選購</button>
      </div>`
  } catch(err) {
    errEl.textContent=`送出失敗：${err.message||'請稍後再試'}`; errEl.classList.add('show')
    btn.disabled=false; btn.textContent='確認下單'
  }
}

function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000) }

updateCount(); renderProducts()
</script>
</body>
</html>
