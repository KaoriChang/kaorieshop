<script>
// ── Supabase 初始化 ──────────────────────────────────────────
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ── 商品資料（對應 orders 表的 text/price/photo_url/priority 欄位）──
// 你可以改成從 Supabase 讀取商品 table，或直接維護這份清單
const PRODUCTS = [
  { id:'p1', name:'手工蜂蜜禮盒', desc:'精選山區純蜂蜜，附精美木盒包裝，送禮自用皆宜', price:980,  emoji:'🍯', cat:'food', tag:'熱銷',   priority:1 },
  { id:'p2', name:'日式陶瓷杯組', desc:'手拉坯工藝，320ml，一對裝，溫潤手感',            price:1580, emoji:'🍵', cat:'home', tag:'新品',   priority:2 },
  { id:'p3', name:'有機茶葉禮盒', desc:'四款台灣高山茶精選組合，茶韻層次豐富',            price:1280, emoji:'🫖', cat:'gift', tag:'',      priority:3 },
  { id:'p4', name:'香氛蠟燭套組', desc:'天然大豆蠟，三種香氣可選，燃燒時長 40hr+',       price:760,  emoji:'🕯️', cat:'home', tag:'',      priority:4 },
  { id:'p5', name:'手工果醬三入', desc:'無添加防腐劑，季節限定口味，早餐首選',            price:650,  emoji:'🫙', cat:'food', tag:'限定',   priority:5 },
  { id:'p6', name:'精品禮盒訂製', desc:'企業送禮首選，可客製化內容與包裝設計',            price:2800, emoji:'🎁', cat:'gift', tag:'客製',   priority:6 },
]

// ── 狀態 ────────────────────────────────────────────────────
let cart = []
let currentFilter = 'all'

// ── 商品渲染 ─────────────────────────────────────────────────
function catBg(cat) {
  return { food:'#fef9f0', home:'#f0f5f2', gift:'#f5f0f8' }[cat] || '#f5f5f5'
}

function renderProducts(filter = 'all') {
  const items = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.cat === filter)
  document.getElementById('grid').innerHTML = items.map(p => `
    <div class="product-card">
      <div class="product-img" style="background:${catBg(p.cat)}">
        ${p.emoji}
        ${p.tag ? `<div class="product-badge">${p.tag}</div>` : ''}
      </div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-foot">
          <div class="product-price">NT$${p.price.toLocaleString()}</div>
          <button class="add-btn" id="btn_${p.id}" onclick="addToCart('${p.id}')">加入購物車</button>
        </div>
      </div>
    </div>
  `).join('')
}

function filterBy(el, cat) {
  document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'))
  el.classList.add('active')
  currentFilter = cat
  renderProducts(cat)
}

// ── 購物車 ───────────────────────────────────────────────────
function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id)
  const ex = cart.find(x => x.id === id)
  if (ex) ex.qty++; else cart.push({ ...p, qty: 1 })
  updateCount()
  showToast(`已加入「${p.name}」`)
  const btn = document.getElementById('btn_' + id)
  if (btn) {
    btn.textContent = '✓ 已加入'; btn.classList.add('done')
    setTimeout(() => { btn.textContent = '加入購物車'; btn.classList.remove('done') }, 1500)
  }
}

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id)
  updateCount()
  renderCart()
}

function updateCount() {
  const n = cart.reduce((a, b) => a + b.qty, 0)
  document.getElementById('cartCount').textContent = n
}

function cartTotal() {
  return cart.reduce((a, b) => a + b.price * b.qty, 0)
}

function openCart() {
  document.getElementById('overlay').classList.add('open')
  document.getElementById('drawer').classList.add('open')
  renderCart()
}

function closeCart() {
  document.getElementById('overlay').classList.remove('open')
  document.getElementById('drawer').classList.remove('open')
}

function renderCart() {
  const body = document.getElementById('drawerBody')
  const foot = document.getElementById('drawerFoot')
  if (cart.length === 0) {
    body.innerHTML = `<div class="empty-cart"><div>🛒</div>購物車是空的</div>`
    foot.style.display = 'none'
    return
  }
  body.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-thumb">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name} × ${item.qty}</div>
        <div class="cart-item-meta">NT$${item.price.toLocaleString()} / 件</div>
      </div>
      <div class="cart-item-price">NT$${(item.price * item.qty).toLocaleString()}</div>
      <button class="remove-item" onclick="removeFromCart('${item.id}')">✕</button>
    </div>
  `).join('')
  document.getElementById('cartTotalText').textContent = 'NT$' + cartTotal().toLocaleString()
  foot.style.display = 'block'
}

// ── 訂單表單 ─────────────────────────────────────────────────
function openForm() {
  closeCart()
  renderOrderSummary()
  document.getElementById('modalBg').classList.add('open')
}

function closeForm() {
  document.getElementById('modalBg').classList.remove('open')
}

document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeForm()
})

function renderOrderSummary() {
  const items = cart.map(item =>
    `<div class="osb-item"><span>${item.name} × ${item.qty}</span><span>NT$${(item.price*item.qty).toLocaleString()}</span></div>`
  ).join('')
  document.getElementById('orderSummary').innerHTML = `
    <div class="osb-label">訂單明細</div>
    ${items}
    <div class="osb-total"><span>合計</span><span>NT$${cartTotal().toLocaleString()}</span></div>
  `
}

// ── 送出訂單 → 寫入 Supabase ─────────────────────────────────
async function submitOrder() {
  const name  = document.getElementById('f_name').value.trim()
  const phone = document.getElementById('f_phone').value.trim()
  const email = document.getElementById('f_email').value.trim()
  const addr  = document.getElementById('f_addr').value.trim()
  const pay   = document.getElementById('f_pay').value
  const time  = document.getElementById('f_time').value
  const note  = document.getElementById('f_note').value.trim()

  const errEl = document.getElementById('errorMsg')
  errEl.classList.remove('show')

  if (!name || !phone || !email || !addr) {
    errEl.textContent = '請填寫所有必填欄位（姓名、電話、Email、地址）'
    errEl.classList.add('show')
    return
  }

  const btn = document.getElementById('submitBtn')
  btn.disabled = true
  btn.innerHTML = '<div class="spinner"></div> 送出中...'

  try {
    // Step 1：確保 customer 存在（upsert by name）
    // 若你的 customers 表有 email 欄位，可改用 email 作為 unique key
    const { data: custData, error: custErr } = await db
      .from('customers')
      .upsert(
        { name: name },
        { onConflict: 'name', ignoreDuplicates: false }
      )
      .select('id')
      .single()

    if (custErr) throw custErr
    const customerId = custData.id

    // Step 2：逐筆建立 order（對應你的 orders 表結構）
    // orders.text = 商品名稱
    // orders.note = 備註（附加配送資訊）
    // orders.price = 單價
    // orders.status = 初始狀態
    // orders.customer_id = 對應 customers.id
    const orderRows = cart.map(item => ({
      customer_id: customerId,
      text:        item.name,
      note:        [
                     addr && `配送地址：${addr}`,
                     pay  && `付款：${pay}`,
                     time !== '不指定' && `配送時段：${time}`,
                     note && `備註：${note}`,
                     `聯絡：${phone} / ${email}`,
                   ].filter(Boolean).join(' ｜ '),
      status:      'pending',
      price:       item.price,
      priority:    item.priority || 0,
    }))

    const { error: orderErr } = await db
      .from('orders')
      .insert(orderRows)

    if (orderErr) throw orderErr

    // ── 成功！─────────────────────────────────────
    cart = []
    updateCount()

    document.getElementById('modalInner').innerHTML = `
      <div class="success-view">
        <div class="success-icon">🎉</div>
        <h3>訂單已成立！</h3>
        <p>感謝你的購買，我們已收到你的訂單，<br>將在 1 個工作天內確認並安排出貨。</p>
        <p class="success-meta">聯絡電話：${phone}　｜　${email}</p>
        <div class="sync-pill">已同步至訂單管理系統</div>
        <br>
        <button class="btn-ghost" style="border-radius:100px;padding:12px 28px;cursor:pointer;font-size:14px" onclick="closeForm();renderProducts(currentFilter)">繼續購物</button>
      </div>
    `

  } catch (err) {
    console.error('Supabase error:', err)
    errEl.textContent = `送出失敗：${err.message || '請稍後再試'}。請檢查 Supabase URL 與金鑰設定。`
    errEl.classList.add('show')
    btn.disabled = false
    btn.textContent = '確認下單'
  }
}

// ── Toast ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2000)
}

// ── 初始化 ───────────────────────────────────────────────────
renderProducts()
</script>
</body>
