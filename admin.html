<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #2c2418; --gold: #9e7d52; --gold-light: #c8a96e; --gold-pale: #f5eedf;
  --bg: #fdfaf5; --bg2: #f7f2ea; --surface: #fff;
  --muted: #8a7d6a; --border: rgba(158,125,82,0.18);
  --green: #2d7a4f; --green-bg: #eafaf1; --red: #c0392b; --red-bg: #fdf0ef;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--brand); min-height: 100vh; }

/* ── LOGIN ── */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--brand); padding: 20px;
}
.login-box {
  background: var(--surface); border-radius: 24px; padding: 48px 40px;
  width: 100%; max-width: 400px; text-align: center;
}
.login-logo { height: 72px; width: auto; margin-bottom: 8px; mix-blend-mode: multiply; }
.login-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; letter-spacing: 0.5px; }
.login-group { margin-bottom: 16px; text-align: left; }
.login-group label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.login-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--bg); outline: none; transition: border-color .2s; }
.login-group input:focus { border-color: var(--gold); }
.login-btn { width: 100%; padding: 14px; background: var(--brand); color: var(--gold-pale); border: none; border-radius: 100px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all .2s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.login-btn:hover { background: var(--gold); color: white; }
.login-btn:disabled { background: #aaa; cursor: not-allowed; }
.login-err { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }
.login-err.show { display: block; }

/* ── ADMIN LAYOUT ── */
.admin-wrap { display: none; min-height: 100vh; flex-direction: column; }
.admin-wrap.show { display: flex; }
.admin-nav {
  background: var(--brand); padding: 0 32px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.admin-nav-left { display: flex; align-items: center; gap: 16px; }
.admin-logo { height: 40px; mix-blend-mode: screen; opacity: 0.8; }
.admin-nav-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; color: var(--gold-pale); letter-spacing: 1px; }
.admin-nav-right { display: flex; align-items: center; gap: 16px; }
.admin-user { font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; }
.logout-btn { padding: 7px 18px; border: 1px solid rgba(200,169,110,0.3); color: var(--gold-light); background: transparent; border-radius: 100px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .2s; }
.logout-btn:hover { border-color: var(--gold-light); color: white; }

.admin-body { flex: 1; padding: 32px; max-width: 1100px; margin: 0 auto; width: 100%; }

/* ── STATS ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; }
.stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; }
.stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── SECTION HEADER ── */
.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.sec-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; }
.add-btn-main { padding: 10px 24px; background: var(--brand); color: var(--gold-pale); border: none; border-radius: 100px; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .2s; }
.add-btn-main:hover { background: var(--gold); color: white; }

/* ── PRODUCT TABLE ── */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 40px; }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--bg2); }
th { padding: 12px 16px; text-align: left; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 500; }
td { padding: 14px 16px; border-top: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
tr:hover td { background: var(--bg); }
.td-img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; flex-shrink: 0; }
.td-img img { width: 100%; height: 100%; object-fit: cover; }
.td-name { font-weight: 500; }
.td-cat { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); }
.td-price { font-family: 'Cormorant Garamond', serif; font-size: 18px; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
.badge-on { background: var(--green-bg); color: var(--green); }
.badge-off { background: var(--red-bg); color: var(--red); }
.badge-tag { background: var(--bg2); color: var(--muted); }
.action-btns { display: flex; gap: 8px; }
.edit-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 100px; font-size: 11px; cursor: pointer; background: transparent; color: var(--brand); transition: all .2s; }
.edit-btn:hover { border-color: var(--gold); color: var(--gold); }
.del-btn { padding: 6px 14px; border: 1px solid transparent; border-radius: 100px; font-size: 11px; cursor: pointer; background: transparent; color: var(--muted); transition: all .2s; }
.del-btn:hover { border-color: var(--red); color: var(--red); }
.empty-row td { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; letter-spacing: 1px; }

/* ── MODAL ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(44,36,24,0.55); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border-radius: 24px; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; }
.modal-head { background: var(--bg2); padding: 24px 28px; border-radius: 24px 24px 0 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-head h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; }
.modal-close { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 14px; color: var(--muted); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { border-color: var(--gold); color: var(--gold); }
.modal-body { padding: 24px 28px 28px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.form-group label span { color: var(--red); }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--bg); outline: none; transition: border-color .2s; color: var(--brand); }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.img-preview { width: 100%; height: 160px; border-radius: 12px; object-fit: cover; background: var(--bg2); margin-top: 8px; display: none; border: 1px solid var(--border); }
.img-preview.show { display: block; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 8px; }
.save-btn { padding: 10px 28px; background: var(--brand); color: var(--gold-pale); border: none; border-radius: 100px; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 8px; }
.save-btn:hover { background: var(--gold); color: white; }
.save-btn:disabled { background: #aaa; cursor: not-allowed; }
.cancel-btn { padding: 10px 20px; border: 1px solid var(--border); border-radius: 100px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--muted); transition: all .2s; }
.cancel-btn:hover { border-color: var(--brand); color: var(--brand); }
.form-err { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }
.form-err.show { display: block; }

/* ── CONFIRM DELETE ── */
.confirm-bg { display: none; position: fixed; inset: 0; background: rgba(44,36,24,0.55); z-index: 400; align-items: center; justify-content: center; }
.confirm-bg.open { display: flex; }
.confirm-box { background: var(--surface); border-radius: 20px; padding: 32px; max-width: 360px; text-align: center; }
.confirm-box h4 { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 10px; }
.confirm-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
.confirm-btns { display: flex; gap: 10px; justify-content: center; }
.confirm-del { padding: 10px 24px; background: var(--red); color: white; border: none; border-radius: 100px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }
.confirm-cancel { padding: 10px 24px; border: 1px solid var(--border); border-radius: 100px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--muted); }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--brand); color: var(--gold-light); padding: 12px 24px; border-radius: 100px; font-size: 13px; z-index: 500; transition: transform .3s; pointer-events: none; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

.spinner { width: 14px; height: 14px; border: 2px solid rgba(200,169,110,0.3); border-top-color: var(--gold-light); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .admin-body { padding: 20px 16px; }
  .form-row { grid-template-columns: 1fr; }
  table { font-size: 13px; }
  .admin-user { display: none; }
}
</style>

<script>
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const catLabel = {earring:'耳環',clip:'耳夾',bracelet:'手鍊',necklace:'項鍊',ring:'戒指',hair:'髮飾',creative:'文創'}
let products = []
let editingId = null

// ── AUTH ──────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim()
  const pwd = document.getElementById('loginPwd').value
  const errEl = document.getElementById('loginErr')
  const btn = document.getElementById('loginBtn')
  errEl.classList.remove('show')
  if (!email || !pwd) { errEl.textContent = '請填寫 Email 和密碼'; errEl.classList.add('show'); return }
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> 登入中...'
  const { error } = await db.auth.signInWithPassword({ email, password: pwd })
  if (error) {
    errEl.textContent = '帳號或密碼錯誤，請再試一次'; errEl.classList.add('show')
    btn.disabled = false; btn.textContent = '登入'
  }
}

async function doLogout() {
  await db.auth.signOut()
}

db.auth.onAuthStateChange((event, session) => {
  if (session) {
    document.getElementById('loginWrap').style.display = 'none'
    document.getElementById('adminWrap').classList.add('show')
    document.getElementById('adminUser').textContent = session.user.email
    loadProducts()
  } else {
    document.getElementById('loginWrap').style.display = 'flex'
    document.getElementById('adminWrap').classList.remove('show')
  }
})

// ── PRODUCTS ──────────────────────────────────────
async function loadProducts() {
  const { data, error } = await db.from('products').select('*').order('priority').order('created_at', { ascending: false })
  if (error) { showToast('載入失敗：' + error.message); return }
  products = data || []
  renderTable()
  renderStats()
}

function renderStats() {
  const on = products.filter(p => p.is_available).length
  const cats = new Set(products.map(p => p.category)).size
  document.getElementById('statTotal').textContent = products.length
  document.getElementById('statOn').textContent = on
  document.getElementById('statOff').textContent = products.length - on
  document.getElementById('statCat').textContent = cats
}

function imgSrc(url) {
  if (!url) return null
  if (url.startsWith('http')) return url
  return 'https://kaorichang.github.io/kaorieshop/' + url
}

function renderTable() {
  const tbody = document.getElementById('productTable')
  if (products.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7">尚無商品，點「新增商品」開始建立</td></tr>`
    return
  }
  tbody.innerHTML = products.map(p => `
    <tr>
      <td>
        <div class="td-img">
          ${p.image_url ? `<img src="${imgSrc(p.image_url)}" alt="${p.name}" onerror="this.parentElement.innerHTML='🌸'">` : '🌸'}
        </div>
      </td>
      <td><div class="td-name">${p.name}</div></td>
      <td><div class="td-cat">${catLabel[p.category]||p.category}</div></td>
      <td><div class="td-price">NT$ ${p.price.toLocaleString()}</div></td>
      <td>${p.tag ? `<span class="badge badge-tag">${p.tag}</span>` : '—'}</td>
      <td><span class="badge ${p.is_available?'badge-on':'badge-off'}">${p.is_available?'上架中':'已下架'}</span></td>
      <td>
        <div class="action-btns">
          <button class="edit-btn" onclick="openModal('${p.id}')">編輯</button>
          <button class="del-btn" onclick="confirmDelete('${p.id}','${p.name}')">刪除</button>
        </div>
      </td>
    </tr>`).join('')
}

// ── MODAL ─────────────────────────────────────────
function openModal(id = null) {
  editingId = id
  document.getElementById('modalTitle').textContent = id ? '編輯商品' : '新增商品'
  document.getElementById('formErr').classList.remove('show')
  document.getElementById('imgPreview').classList.remove('show')

  if (id) {
    const p = products.find(x => x.id === id)
    document.getElementById('fName').value = p.name || ''
    document.getElementById('fPrice').value = p.price || ''
    document.getElementById('fDesc').value = p.description || ''
    document.getElementById('fCat').value = p.category || 'earring'
    document.getElementById('fTag').value = p.tag || ''
    document.getElementById('fImg').value = p.image_url || ''
    document.getElementById('fPriority').value = p.priority ?? 0
    document.getElementById('fAvail').value = p.is_available ? 'true' : 'false'
    previewImg()
  } else {
    document.getElementById('fName').value = ''
    document.getElementById('fPrice').value = ''
    document.getElementById('fDesc').value = ''
    document.getElementById('fCat').value = 'earring'
    document.getElementById('fTag').value = ''
    document.getElementById('fImg').value = ''
    document.getElementById('fPriority').value = '0'
    document.getElementById('fAvail').value = 'true'
  }
  document.getElementById('modalBg').classList.add('open')
}

function closeModal() { document.getElementById('modalBg').classList.remove('open') }

function previewImg() {
  const val = document.getElementById('fImg').value.trim()
  const prev = document.getElementById('imgPreview')
  if (!val) { prev.classList.remove('show'); return }
  prev.src = imgSrc(val)
  prev.classList.add('show')
  prev.onerror = () => prev.classList.remove('show')
}

async function saveProduct() {
  const name = document.getElementById('fName').value.trim()
  const price = parseInt(document.getElementById('fPrice').value)
  const desc = document.getElementById('fDesc').value.trim()
  const cat = document.getElementById('fCat').value
  const tag = document.getElementById('fTag').value.trim()
  const img = document.getElementById('fImg').value.trim()
  const priority = parseInt(document.getElementById('fPriority').value) || 0
  const avail = document.getElementById('fAvail').value === 'true'
  const errEl = document.getElementById('formErr')
  errEl.classList.remove('show')

  if (!name || !price) { errEl.textContent = '請填寫商品名稱和價格'; errEl.classList.add('show'); return }

  const btn = document.getElementById('saveBtn')
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> 儲存中...'

  const payload = { name, price, description: desc, category: cat, tag: tag||null, image_url: img||null, priority, is_available: avail }

  let error
  if (editingId) {
    ({ error } = await db.from('products').update(payload).eq('id', editingId))
  } else {
    ({ error } = await db.from('products').insert(payload))
  }

  btn.disabled = false; btn.textContent = '儲存商品'
  if (error) { errEl.textContent = '儲存失敗：' + error.message; errEl.classList.add('show'); return }
  showToast(editingId ? '商品已更新' : '商品已新增')
  closeModal()
  loadProducts()
}

// ── DELETE ────────────────────────────────────────
function confirmDelete(id, name) {
  document.getElementById('confirmMsg').textContent = `確定要刪除「${name}」嗎？此操作無法復原。`
  document.getElementById('confirmBg').classList.add('open')
  document.getElementById('confirmDelBtn').onclick = async () => {
    const { error } = await db.from('products').delete().eq('id', id)
    closeConfirm()
    if (error) { showToast('刪除失敗：' + error.message); return }
    showToast('已刪除商品')
    loadProducts()
  }
}
function closeConfirm() { document.getElementById('confirmBg').classList.remove('open') }

// ── TOAST ─────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500)
}
</script>
</body>
